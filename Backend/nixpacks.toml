# Railway / Nixpacks: root directory must be Backend (contains this file + requirements.txt).
# Do not override [phases.install] with bare `pip` — Nixpacks creates /opt/venv first; a custom
# `pip install` runs before the venv exists and fails with "pip: command not found".
#
# [start] is the authoritative process command (avoids Procfile vs railway.toml drift).
# In Railway → Service → Settings: leave "Custom Start Command" empty unless it matches railway_start.sh.

[variables]
NIXPACKS_PYTHON_VERSION = "3.12"

[start]
cmd = "sh railway_start.sh"
